<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | МИР ДОНОРОВ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            padding: 30px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #c41e3a;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 14px;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
            font-size: 14px;
        }
        
        .status-badge {
            background: #fff9c4;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .export-btn {
            background: #c41e3a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .export-btn:hover {
            background: #a51b32;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Статистика доноров</h1>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <h3>Всего заявок</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>За сегодня</h3>
                <div class="number" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>За эту неделю</h3>
                <div class="number" id="weekCount">0</div>
            </div>
            <div class="stat-card">
                <h3>За этот месяц</h3>
                <div class="number" id="monthCount">0</div>
            </div>
        </div>
        
        <button class="export-btn" onclick="exportToCSV()">⬇️ Экспорт в CSV</button>
        
        <div class="table-container">
            <table id="donorsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Имя</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th>Группа крови</th>
                        <th>Больница</th>
                        <th>Партнер</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="9" style="text-align: center;">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
        function loadDonors() {
            const donors = JSON.parse(localStorage.getItem('mirDonors') || '[]');
            
            // Общая статистика
            document.getElementById('totalCount').textContent = donors.length;
            
            const today = new Date().toLocaleDateString('ru-RU');
            const todayDonors = donors.filter(d => d.date.startsWith(today));
            document.getElementById('todayCount').textContent = todayDonors.length;
            
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekDonors = donors.filter(d => new Date(d.date.split(',')[0].split('.').reverse().join('-')) > weekAgo);
            document.getElementById('weekCount').textContent = weekDonors.length;
            
            const monthAgo = new Date();
            monthAgo.setMonth(monthAgo.getMonth() - 1);
            const monthDonors = donors.filter(d => new Date(d.date.split(',')[0].split('.').reverse().join('-')) > monthAgo);
            document.getElementById('monthCount').textContent = monthDonors.length;
            
            // Таблица
            let html = '';
            donors.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(d => {
                html += `
                    <tr>
                        <td><code>${d.id}</code></td>
                        <td>${d.date}</td>
                        <td>${d.name}</td>
                        <td>${d.phone}</td>
                        <td>${d.email}</td>
                        <td>${d.bloodType}</td>
                        <td>${d.hospital}</td>
                        <td>${d.partner}</td>
                        <td><span class="status-badge">${d.status}</span></td>
                    </tr>
                `;
            });
            
            if (donors.length === 0) {
                html = '<tr><td colspan="9" style="text-align: center;">Пока нет заявок</td></tr>';
            }
            
            document.getElementById('tableBody').innerHTML = html;
        }
        
        function exportToCSV() {
            const donors = JSON.parse(localStorage.getItem('mirDonors') || '[]');
            
            if (donors.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }
            
            let csv = 'ID,Дата,Имя,Телефон,Email,Группа крови,Больница,Партнер,Статус\n';
            
            donors.forEach(d => {
                csv += `"${d.id}","${d.date}","${d.name}","${d.phone}","${d.email}","${d.bloodType}","${d.hospital}","${d.partner}","${d.status}"\n`;
            });
            
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `donors_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
        
        loadDonors();
    </script>
</body>
</html>
